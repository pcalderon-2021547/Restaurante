version: "3.9"

services:
    postgres:
      image: postgres:16
      container_name: auth-service
      restart: always
      environment:
        POSTGRES_DB: DirectorioComunitarioDB
        POSTGRES_USER: root
        POSTGRES_PASSWORD: admin
      ports:
       - "5435:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
    mongo:
      image: mongo:6
      container_name: restaurante-mongo
      restart: always
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: